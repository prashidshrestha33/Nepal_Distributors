<aside
  class="fixed flex flex-col top-0 px-5 left-0 bg-white text-gray-900 h-screen transition-all duration-300 ease-in-out z-50 border-r border-gray-200"
  [ngClass]="{
    'w-[250px]':
      (isExpanded$ | async) || (isMobileOpen$ | async) || (isHovered$ | async),
    'w-[80px]': !(
      (isExpanded$ | async) ||
      (isMobileOpen$ | async) ||
      (isHovered$ | async)
    ),
    'translate-x-0': isMobileOpen$ | async,
    '-translate-x-full': !(isMobileOpen$ | async),
    'xl:translate-x-0': true
  }" (mouseenter)="onSidebarMouseEnter()" (mouseleave)="sidebarService.setHovered(false)">
  <div class="py-7 flex w-full items-center border-b border-gray-100/50 mb-4" [ngClass]="{
      'xl:justify-center px-0': !((isExpanded$ | async) || (isHovered$ | async)),
      'justify-start px-2': (isExpanded$ | async) || (isHovered$ | async)
    }">
    <div class="flex flex-col transition-all duration-500 ease-in-out px-1" [ngClass]="{
            'opacity-0 w-0 -translate-x-10 pointer-events-none': !((isExpanded$ | async) || (isHovered$ | async) || (isMobileOpen$ | async)),
            'opacity-100 w-auto translate-x-0': ((isExpanded$ | async) || (isHovered$ | async) || (isMobileOpen$ | async))
          }">
      <h1 class="text-2xl font-black tracking-tighter leading-none text-blue-800 drop-shadow-sm">
        Nepal Distributors
      </h1>
    </div>
  </div>

  <div class="flex flex-col overflow-y-auto duration-300 ease-linear no-scrollbar">
    <nav class="mb-6">
      <ul class="flex flex-col gap-1">
        <li *ngFor="let item of navItems">
          <a [routerLink]="item.path" [queryParams]="item.queryParams"
            class="menu-item group cursor-pointer flex items-center gap-4 p-2 rounded-md hover:bg-gray-100"
            [ngClass]="{ 'bg-gray-200': isActive(item.path) }">
            <span [innerHTML]="item.icon | safeHtml"></span>
            <span>{{ item.name }}</span>
          </a>
        </li>
      </ul>

      <!-- Render othersItems -->
      <ul class="flex flex-col gap-1 mt-4">
        <li *ngFor="let item of othersItems">
          <div>
            <button (click)="toggleSubmenu(item.name)"
              class="menu-item group cursor-pointer flex items-center gap-4 p-2 rounded-md hover:bg-gray-100 w-full text-left"
              [ngClass]="{ 'bg-gray-200': isActive(item.path) }">
              <span [innerHTML]="item.icon | safeHtml"></span>
              <span>{{ item.name }}</span>
            </button>

            <!-- Submenu for Authentication -->
            <ul *ngIf="openSubmenu === item.name" class="ml-4 mt-2">
              <li *ngFor="let subItem of item.subItems">
                <a [routerLink]="subItem.path"
                  class="menu-item group cursor-pointer flex items-center gap-4 p-2 rounded-md hover:bg-gray-100"
                  [ngClass]="{ 'bg-gray-200': isActive(subItem.path) }">
                  <span>{{ subItem.name }}</span>
                </a>
              </li>
            </ul>
          </div>
        </li>
      </ul>
    </nav>
  </div>
</aside>
