<div class="relative">
  <button
    class="relative flex items-center justify-center text-gray-500 transition-colors bg-white border border-gray-200 rounded-full dropdown-toggle hover:text-gray-700 h-11 w-11 hover:bg-gray-100 dark:border-gray-200 dark:hover:bg-gray-100"
    (click)="toggleDropdown()"
    aria-label="Notifications"
  >
    <!-- Bell Icon SVG -->
    <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"></path>
    </svg>

    <!-- Pulse Dot for Unread -->
    <span
      class="absolute right-2 top-2 z-10 h-2.5 w-2.5 rounded-full bg-red-500 border border-white"
      [ngClass]="{ 'hidden': !notifying, 'flex': notifying }"
    >
      <span class="absolute inline-flex w-full h-full bg-red-400 rounded-full opacity-75 animate-ping"></span>
    </span>
  </button>

  <app-dropdown
    [isOpen]="isOpen"
    (close)="closeDropdown()"
    className="absolute -right-[240px] mt-[17px] flex h-[480px] w-[350px] flex-col rounded-2xl border border-gray-200 bg-white p-3 shadow-theme-lg sm:w-[361px] lg:right-0"
  >
    <!-- Dropdown Header -->
    <div class="flex items-center justify-between pb-3 mb-3 border-b border-gray-100">
      <h5 class="text-base font-bold text-gray-800">
        Notifications ({{ notifications.length }})
      </h5>
      <button
        *ngIf="notifications.length > 0"
        (click)="clearAll($event)"
        class="text-xs font-semibold text-blue-600 hover:text-blue-800 transition"
      >
        Clear All
      </button>
    </div>

    <!-- Dropdown Body -->
    <div class="flex-1 overflow-y-auto no-scrollbar space-y-1 pr-1">
      <!-- Empty State -->
      <div *ngIf="notifications.length === 0" class="flex flex-col items-center justify-center h-full text-center p-6 space-y-3">
        <div class="bg-gray-50 p-4 rounded-full text-gray-400">
          <svg class="w-10 h-10" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"></path>
          </svg>
        </div>
        <p class="text-sm font-bold text-gray-700">All caught up!</p>
        <p class="text-xs text-gray-400">No new notifications at this time.</p>
      </div>

      <!-- Notifications List -->
      <div 
        *ngFor="let item of notifications" 
        (click)="onNotificationClick(item)"
        class="group flex gap-3.5 items-start p-3 rounded-xl cursor-pointer transition-colors duration-200 border-b border-gray-50 last:border-b-0"
        [ngClass]="{
          'bg-blue-50/50 hover:bg-blue-50': !item.read,
          'bg-white hover:bg-gray-50': item.read
        }"
      >
        <!-- Icon Wrapper based on Notification Type -->
        <div class="flex-shrink-0 mt-0.5 p-2 rounded-lg" [ngClass]="{
          'bg-blue-100 text-blue-600': item.type === 'order',
          'bg-indigo-100 text-indigo-600': item.type === 'chat',
          'bg-gray-100 text-gray-600': item.type !== 'order' && item.type !== 'chat'
        }">
          <!-- Package Icon for Order -->
          <svg *ngIf="item.type === 'order'" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path>
          </svg>
          <!-- Chat/Bubble Icon for Chat -->
          <svg *ngIf="item.type === 'chat'" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
          </svg>
          <!-- Generic Bell for System/Others -->
          <svg *ngIf="item.type !== 'order' && item.type !== 'chat'" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
        </div>

        <!-- Text Content -->
        <div class="flex-1 min-w-0">
          <div class="flex justify-between items-start gap-1">
            <h6 class="text-xs font-bold text-gray-800 truncate" [ngClass]="{ 'text-blue-900': !item.read }">
              {{ item.title }}
            </h6>
            <span class="text-[10px] text-gray-400 flex-shrink-0">
              {{ item.createdAt | date: 'shortTime' }}
            </span>
          </div>
          <p class="text-[11px] text-gray-500 line-clamp-2 mt-0.5" [ngClass]="{ 'text-gray-700': !item.read }">
            {{ item.body }}
          </p>
        </div>
      </div>
    </div>
  </app-dropdown>
</div>
