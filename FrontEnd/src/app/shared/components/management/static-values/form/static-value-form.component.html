<div class="space-y-6">
  <div class="bg-white rounded-lg shadow p-8">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
      <input type="hidden" formControlName="staticId">
      <input type="hidden" formControlName="catalogId">

      <!-- KEY FIELD with Radio Toggle -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-3">{{ keyTitle }} *</label>

        <!-- Radio Button Toggle -->
        <div class="inline-flex rounded-xl border border-gray-200 bg-gray-50 p-1 gap-1 mb-4">
          <button type="button"
            (click)="setKeyInputMode('text')"
            [class.bg-white]="keyInputMode === 'text'"
            [class.shadow-sm]="keyInputMode === 'text'"
            [class.text-blue-700]="keyInputMode === 'text'"
            [class.font-bold]="keyInputMode === 'text'"
            [class.text-gray-500]="keyInputMode !== 'text'"
            class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm transition-all duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
            </svg>
            Text / URL
          </button>
          <button type="button"
            (click)="setKeyInputMode('upload')"
            [class.bg-white]="keyInputMode === 'upload'"
            [class.shadow-sm]="keyInputMode === 'upload'"
            [class.text-blue-700]="keyInputMode === 'upload'"
            [class.font-bold]="keyInputMode === 'upload'"
            [class.text-gray-500]="keyInputMode !== 'upload'"
            class="flex items-center gap-2 px-4 py-2 rounded-lg text-sm transition-all duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
            </svg>
            Upload Image
          </button>
        </div>

        <!-- MODE A: Text / URL input -->
        <ng-container *ngIf="keyInputMode === 'text'">
          <input
            type="text"
            formControlName="staticValueKey"
            placeholder="Enter key or URL"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        </ng-container>

        <!-- MODE B: Image Upload -->
        <ng-container *ngIf="keyInputMode === 'upload'">
          <div class="space-y-3">
            <input type="hidden" formControlName="staticValueKey">

            <div class="flex items-center gap-4">
              <input
                type="file"
                (change)="onFileSelected($event)"
                accept=".jpg,.jpeg,.png,.gif,.svg,.webp,.pdf"
                class="hidden"
                #fileInput>

              <button
                type="button"
                (click)="fileInput.click()"
                [disabled]="isUploadingFile"
                class="flex items-center gap-2 px-5 py-2.5 bg-blue-50 hover:bg-blue-100 text-blue-700 font-semibold rounded-lg border border-blue-200 transition disabled:opacity-50">
                <svg *ngIf="!isUploadingFile" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                </svg>
                <svg *ngIf="isUploadingFile" class="w-4 h-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                </svg>
                {{ isUploadingFile ? 'Uploading...' : 'Choose Image' }}
              </button>

              <span class="text-sm text-gray-500 font-medium" *ngIf="uploadedFileName">
                ✓ {{ uploadedFileName }}
              </span>
            </div>

            <!-- Image preview -->
            <div *ngIf="uploadedFileName && !uploadedFileName.endsWith('.pdf')"
                 class="border border-gray-200 rounded-xl p-3 max-w-xs bg-gray-50 flex items-center justify-center">
              <img [src]="getImageUrl(uploadedFileName)" alt="Preview"
                   class="max-h-48 max-w-full rounded-lg object-contain shadow-sm">
            </div>
            <div *ngIf="uploadedFileName && uploadedFileName.endsWith('.pdf')"
                 class="flex items-center gap-2 text-red-600 font-semibold p-3 bg-red-50 rounded-lg border border-red-100 max-w-xs">
              <span class="text-2xl">📄</span><span>PDF Document</span>
            </div>
          </div>
        </ng-container>

        <span *ngIf="isFieldInvalid('staticValueKey')" class="text-red-500 text-sm mt-1 block">
          {{ keyInputMode === 'upload' ? 'Please upload an image file' : 'Key is required' }}
        </span>
      </div>


      <!-- Value (Standard text input for all catalogs) -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">{{ dataTitle }} *</label>
        <input
          type="text"
          formControlName="staticData"
          placeholder="Enter value"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        <span *ngIf="isFieldInvalid('staticData')" class="text-red-500 text-sm mt-1 block">
          Value is required
        </span>
      </div>

      <!-- Display Order -->
      <div>
        <label class="block text-sm font-semibold text-gray-700 mb-2">Display Order *</label>
        <input
          type="number"
          formControlName="displayOrder"
          placeholder="Enter display order"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
        <span *ngIf="isFieldInvalid('displayOrder')" class="text-red-500 text-sm mt-1">
          Display order is required
        </span>
      </div>

      <!-- Error Message -->
      <div *ngIf="error" class="p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg">
        {{ error }}
      </div>

      <!-- Buttons -->
      <div class="flex gap-4">
        <button
          type="submit"
          [disabled]="!form.valid || loading"
          class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-8 rounded-lg transition disabled:opacity-50">
          {{ loading ? 'Saving...' : 'Save Value' }}
        </button>
        <button
          type="button"
          (click)="goBack()"
          class="bg-gray-400 hover:bg-gray-500 text-white font-bold py-2 px-8 rounded-lg transition">
          Cancel
        </button>
      </div>
    </form>
  </div>
</div>
