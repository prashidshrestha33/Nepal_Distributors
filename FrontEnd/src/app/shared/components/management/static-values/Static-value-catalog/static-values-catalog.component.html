<div class="w-full h-screen bg-[#F8FAFC] flex flex-col font-sans overflow-hidden">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 px-4 sm:px-6 py-3 sm:py-4 shadow-sm">
    <div class="flex items-center justify-between gap-3 flex-wrap">
      <div>
        <h1 class="text-gray-900 font-bold text-base sm:text-lg tracking-tight">Static Values Catalog</h1>
      </div>
    </div>
  </header>

  <!-- Main Body -->
  <div class="flex flex-1 w-full overflow-hidden relative">
    <main class="flex-1 w-full overflow-y-auto px-4 sm:px-6 py-4 sm:py-6 space-y-4 sm:space-y-6">

      <!-- Toolbar: Search -->
      <div class="py-1 w-full">
        <div class="relative w-full group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg class="w-5 h-5 text-gray-400 group-focus-within:text-blue-500 transition-colors" fill="none"
              stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </div>
          <input type="text" [(ngModel)]="searchTerm" (input)="onSearch()" placeholder="Search catalogs..."
            class="w-full pl-12 pr-12 py-3 sm:py-3.5 bg-white border border-gray-200 rounded-[1.125rem] text-sm font-semibold text-gray-900 shadow-sm focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 focus:outline-none transition-all placeholder:text-gray-400">
        </div>
      </div>

      <!-- Error State -->
      <div *ngIf="error" class="bg-red-50 border border-red-200 p-4 rounded-xl text-red-700 flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span class="text-sm font-semibold">{{ error }}</span>
      </div>

      <!-- Table Card -->
      <div class="bg-white rounded-[1.25rem] border border-gray-200 shadow-sm relative flex flex-col min-h-[400px]">
        <!-- Loading Overlay -->
        <div *ngIf="loading"
          class="absolute inset-0 bg-white/60 backdrop-blur-sm z-20 flex flex-col items-center justify-center rounded-[1.25rem]">
          <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
          <span class="mt-4 text-sm font-bold text-gray-900 tracking-tight">Syncing Data...</span>
        </div>

        <div class="overflow-x-auto w-full flex-1">
          <table class="w-full text-left border-collapse whitespace-nowrap">
            <thead>
              <tr class="bg-gray-50 border-b border-gray-200 select-none">
                <th class="px-6 py-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest cursor-pointer hover:bg-gray-100 transition-colors group" (click)="onSort('catalogName')">
                  <div class="flex items-center gap-1">
                    Catalog Name
                    <span class="text-gray-400 group-hover:text-blue-500" *ngIf="sortColumn !== 'catalogName'">↕</span>
                    <span class="text-blue-600" *ngIf="sortColumn === 'catalogName' && sortDirection === 'asc'">↑</span>
                    <span class="text-blue-600" *ngIf="sortColumn === 'catalogName' && sortDirection === 'desc'">↓</span>
                  </div>
                </th>
                <th class="px-6 py-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest cursor-pointer hover:bg-gray-100 transition-colors group" (click)="onSort('catalogType')">
                  <div class="flex items-center gap-1">
                    Type
                    <span class="text-gray-400 group-hover:text-blue-500" *ngIf="sortColumn !== 'catalogType'">↕</span>
                    <span class="text-blue-600" *ngIf="sortColumn === 'catalogType' && sortDirection === 'asc'">↑</span>
                    <span class="text-blue-600" *ngIf="sortColumn === 'catalogType' && sortDirection === 'desc'">↓</span>
                  </div>
                </th>
                <th class="px-6 py-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest">Description</th>
                <th class="px-6 py-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest text-right">Actions</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-100 align-middle">
              <tr *ngFor="let item of paginatedItems" class="hover:bg-gray-50/50 transition-colors group">
                <td class="px-6 py-4">
                  <div class="text-sm font-bold text-gray-900">{{ item.catalogName }}</div>
                </td>
                <td class="px-6 py-4">
                  <span
                    class="inline-flex px-2.5 py-1 rounded-lg text-[11px] font-bold border tracking-wide uppercase bg-blue-50 text-blue-700 border-blue-200">
                    {{ item.catalogType || 'N/A' }}
                  </span>
                </td>
                <td class="px-6 py-4">
                  <div class="text-sm text-gray-600 truncate max-w-xs">{{ item.catalogDescription }}</div>
                </td>
                <td class="px-6 py-4 text-right">
                  <div class="flex items-center justify-end gap-2">
                    <button (click)="viewStaticValues(item.catalogId!)" title="View Values"
                      class="px-4 py-2 rounded-lg bg-white border border-gray-200 text-gray-700 hover:bg-blue-50 hover:text-blue-600 hover:border-blue-200 transition-all text-xs font-bold shadow-[0_1px_2px_rgba(0,0,0,0.05)] active:scale-95 group-hover:shadow-[0_4px_12px_rgba(37,99,235,0.1)]">
                      View List &rarr;
                    </button>
                  </div>
                </td>
              </tr>

              <!-- Empty State -->
              <tr *ngIf="!loading && filteredItems.length === 0">
                <td colspan="4" class="py-24 text-center">
                  <div class="flex flex-col items-center justify-center opacity-60">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-16 h-16 text-gray-300 mb-4" fill="none"
                      viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                    <span class="text-lg font-bold text-gray-500 tracking-tight">No catalogs found</span>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Pagination Footer -->
        <div *ngIf="!loading && filteredItems.length > 0"
          class="px-4 sm:px-6 py-3 sm:py-4 border-t border-gray-100 flex flex-wrap items-center justify-between gap-3 bg-white text-sm rounded-b-[1.25rem] mt-auto">
          <div class="text-[11px] font-bold text-gray-400 uppercase tracking-widest bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-100">
            PAGE {{ currentPage }} OF {{ totalPages || 1 }}
          </div>
          <div class="flex items-center gap-1.5 bg-gray-50 p-1 rounded-xl border border-gray-100">
            <button (click)="onPageChange(currentPage - 1)" [disabled]="currentPage === 1"
              class="px-3 sm:px-4 py-1.5 sm:py-2 bg-white border border-gray-200 rounded-lg font-bold text-gray-600 disabled:opacity-50 disabled:cursor-not-allowed hover:text-blue-600 hover:border-blue-200 transition-colors shadow-sm text-xs sm:text-sm active:scale-95">
              Previous
            </button>
            
            <div class="flex items-center gap-1 px-1 sm:px-2">
              <ng-container *ngFor="let page of [].constructor(totalPages); let i = index">
                <button *ngIf="i + 1 === 1 || i + 1 === totalPages || (i + 1 >= currentPage - 1 && i + 1 <= currentPage + 1)"
                  (click)="onPageChange(i + 1)"
                  [ngClass]="currentPage === i + 1 ? 'bg-blue-600 text-white shadow-md shadow-blue-200 border-blue-600' : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900 border-transparent bg-transparent'"
                  class="w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center rounded-lg font-bold text-xs border transition-all">
                  {{ i + 1 }}
                </button>
                <span *ngIf="totalPages > 5 && (i + 1 === 2 && currentPage > 3)"
                  class="text-gray-300 tracking-widest px-1 font-bold">...</span>
                <span *ngIf="totalPages > 5 && (i + 1 === totalPages - 1 && currentPage < totalPages - 2)"
                  class="text-gray-300 tracking-widest px-1 font-bold">...</span>
              </ng-container>
            </div>

            <button (click)="onPageChange(currentPage + 1)" [disabled]="currentPage === totalPages"
              class="px-3 sm:px-4 py-1.5 sm:py-2 bg-white border border-gray-200 rounded-lg font-bold text-gray-600 disabled:opacity-50 disabled:cursor-not-allowed hover:text-blue-600 hover:border-blue-200 transition-colors shadow-sm text-xs sm:text-sm active:scale-95">
              Next
            </button>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>
