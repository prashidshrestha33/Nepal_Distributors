<div class="min-h-screen bg-gray-50 p-4 md:p-6 space-y-6">

  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div>
      <h1 class="text-2xl md:text-3xl font-bold text-gray-900">Categories</h1>
      <p class="text-sm text-gray-500 mt-1">Manage your product categories & sub-categories</p>
    </div>
    <a routerLink="/management/categories/add"
       class="inline-flex items-center justify-center px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg shadow-sm transition">
      + Add New Category
    </a>
  </div>

  <!-- Search -->
  <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-4">
    <input type="text"
           [(ngModel)]="searchTerm"
           (input)="onSearch()"
           placeholder="Search by name or slug..."
           class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm">
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="bg-blue-50 p-6 rounded-xl text-center text-blue-700">
    Loading categories...
  </div>

  <!-- Table -->
  <div *ngIf="!loading" class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full min-w-max">
        <thead class="bg-gray-50 border-b border-gray-200">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider w-12">S.N</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Name</th>
            <th class="hidden sm:table-cell px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Slug</th>
            <th class="hidden md:table-cell px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Parent</th>
            <th class="px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Image</th>
            <th class="px-4 py-3 text-center text-xs font-semibold text-gray-600 uppercase tracking-wider">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
          <tr *ngFor="let cat of filteredItems; let i = index"
              class="hover:bg-gray-50 transition-colors">
            <td class="px-4 py-4 whitespace-nowrap text-sm text-gray-500">
              {{ i + 1 }}
            </td>
            <td class="px-4 py-4 whitespace-nowrap">
              <div class="flex items-center">
                <div
                     class="text-sm font-medium text-gray-900">
                  {{ cat.name }}
                </div>
              </div>
            </td>
            <td class="hidden sm:table-cell px-4 py-4 whitespace-nowrap text-sm text-gray-500">
              <code class="bg-gray-100 px-2 py-0.5 rounded text-xs">{{ cat.slug }}</code>
            </td>
            <td class="hidden md:table-cell px-4 py-4 whitespace-nowrap text-sm text-gray-500">
              {{ getParentCategoryName(cat.parentId) }}
            </td>
            <td class="px-4 py-4 whitespace-nowrap">
              <ng-container *ngIf="cat.image; else noImage">
                <img [src]="getImageUrl(cat.image)"
                     alt="{{ cat.name }}"
                     class="h-10 w-10 rounded-md object-cover border border-gray-200 shadow-sm">
              </ng-container>
              <ng-template #noImage>
                <span class="text-gray-400 text-sm">—</span>
              </ng-template>
            </td>
            <td class="px-4 py-4 whitespace-nowrap text-center text-sm font-medium">
              <div class="flex items-center justify-center gap-2">
                <button (click)="openMoveModal(cat)"
                        title="Move"
                        class="p-2 rounded-full bg-green-50 text-green-600 hover:bg-green-100 transition">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
                  </svg>
                </button>

                <button title="Edit" class="p-2 rounded-full bg-blue-50 text-blue-600 hover:bg-blue-100 transition">
                  <span class="inline-block rotate-[135deg]">✏</span>
                </button>
              </div>
            </td>
          </tr>

          <tr *ngIf="filteredItems.length === 0">
            <td colspan="6" class="px-6 py-12 text-center text-gray-500">
              No categories found
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Move Modal -->
  <app-category-move-modal
    [isOpen]="showMoveModal"
    [category]="selectedCategoryForMove"
    [loading]="moveFormLoading"
    [error]="moveError"
    (submit)="onMoveSubmit($event)"
    (close)="closeMoveModal()">
  </app-category-move-modal>

</div>
